# suppress inspection "UnusedProperty" for whole file
# Fly.io profile: Spring + DB + Google Drive (Java 25). Active with prod,flyio.

# HikariCP settings tuned for long Fly.io suspend/wake cycles (hours).
# - keep minimum-idle at 0 so idle sockets are not kept unnecessarily.
# - allow startup retries for 2 min (aligned with Fly health check grace period).
# - recycle connections aggressively to avoid server-closed sockets.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=180000
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true

# Suppress HHH10001005 which logs the full JDBC URL including embedded password
logging.level.org.hibernate.orm.connections.pooling=WARN

# Workaround to set Fly.io secrets as properties #

spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

google-api-key=${GOOGLE_API_KEY}
gedcom-storage-google-drive.enabled=true
gedcom-storage-google-drive-file-id=${GEDCOM_GOOGLE_DRIVE_FILE_ID}
